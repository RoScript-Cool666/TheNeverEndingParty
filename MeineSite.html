<!DOCTYPE html>
<html>
<head>
<title>Never Ending Party</title>

<style>
body{
margin:0;
padding:0;
background-image:url("https://images.unsplash.com/photo-1492684223066-81342ee5ff30");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
color:white;
text-align:center;
font-family:Arial;
}

.overlay{
background:rgba(0,0,0,0.6);
width:100%;
height:100vh;
padding-top:120px;
box-sizing:border-box;
}

h1{
font-size:65px;
color:hotpink;
}

p{
font-size:22px;
margin-bottom:40px;
}

button{
display:block;
margin:15px auto;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
width:260px;
transition:0.2s;
}

button:hover{
transform:scale(1.08);
}

.play{background:limegreen;color:white;}
.discord{background:#5865F2;color:white;}
.updates{background:orange;color:white;}
</style>

</head>
<body>

<div class="overlay">

<h1>Never Ending Party 🎉</h1>
<p>The chaos never stops.</p>

<button class="play"
onclick="window.location.href='https://www.roblox.com/games/88849578352218/N2ver-EnDing-Part9';">
PLAY NOW
</button>

<button class="discord"
onclick="window.location.href='https://discord.gg/FtXNZcYfhT';">
JOIN DISCORD
</button>

<button class="updates"
onclick="window.location.href='https://www.youtube.com/@MysticADHD';">
UPDATES
</button>

</div>

</body>
</html>
